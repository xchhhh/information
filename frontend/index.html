<!DOCTYPE html>
<!-- 声明这是 HTML5 文档 -->
<html lang="zh-CN">
<!-- lang="zh-CN"：声明页面语言，利于屏幕阅读器与搜索引擎识别 -->

<head>
  <meta charset="UTF-8" />
  <!-- UTF-8 编码，保证中文不乱码 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- viewport-fit=cover：适配刘海屏，安全区不被遮挡 -->
  <meta name="description" content="许成合的个人 AI 助手，基于 RAG 检索增强生成，可回答关于其经历、技能与项目的问题" />
  <meta name="color-scheme" content="light dark" />
  <!-- 声明同时支持浅色/深色，浏览器按 data-theme 渲染 -->
  <title>许成合 · 个人 AI 助手</title>

  <style>
    /* ============ 设计令牌（Design Tokens）：默认深色（贴近 DeepSeek 的克制深色） ============ */
    :root {
      --accent: #4D6BFE;            /* 主色：DeepSeek 蓝紫，克制专业 */
      --accent-strong: #3b5bdb;     /* 主色加深：hover 态 */
      --bg: #0d0d0d;                /* 页面背景：近黑 */
      --surface: #161616;           /* 卡片 / 输入区 / 顶栏：深灰 */
      --surface-2: #242424;         /* 用户气泡 / 次级面 */
      --ink: #ececec;               /* 主文字：浅灰白 */
      --text-dim: #8a8a8a;          /* 次要文字：中灰 */
      --border: #2a2a2a;            /* 边框：深灰描边，比主题色更统一 */
      --border-soft: #222222;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
      --shadow: 0 8px 24px -12px rgba(0,0,0,.6);
      --radius: 16px;               /* 统一大圆角 */
      --radius-sm: 10px;            /* 小圆角 */
      --ease: cubic-bezier(0.16, 1, 0.3, 1); /* 平滑减速缓动 */
    }

    /* ============ 浅色主题令牌（data-theme="light" 时生效） ============ */
    :root[data-theme="light"] {
      --bg: #ffffff;
      --surface: #f7f7f8;
      --surface-2: #eff0f1;
      --ink: #1a1a1a;
      --text-dim: #6b6b6b;
      --border: #e5e5e7;
      --border-soft: #ededf0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow: 0 8px 24px -12px rgba(0,0,0,.12);
    }
    /* 跟随系统且系统为深色时，套用同一套深色令牌 */
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] {
        --bg: #0d0d0d; --surface: #161616; --surface-2: #242424;
        --ink: #ececec; --text-dim: #8a8a8a; --border: #2a2a2a; --border-soft: #222222;
        --shadow-sm: 0 1px 3px rgba(0,0,0,.4); --shadow: 0 8px 24px -12px rgba(0,0,0,.6);
      }
    }

    /* 清零默认边距，统一盒模型 */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* 页面整体：纯色底、纵向弹性布局、占满视口高度 */
    body {
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      transition: background-color .3s var(--ease), color .3s var(--ease);
    }

    /* ============ 顶部：极简标题栏（纯色 + 底部细线，去掉渐变/极光） ============ */
    header {
      position: relative;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    .profile {
      display: flex; align-items: center; gap: 12px;
      max-width: 800px; margin: 0 auto; text-align: left;
    }
    /* 小 Logo：圆角方块 + 主色描边，克制不浮夸 */
    .avatar-sm {
      width: 38px; height: 38px; flex: 0 0 auto; border-radius: 10px;
      background: var(--surface-2); color: var(--accent);
      display: grid; place-items: center; border: 1px solid var(--border);
    }
    .avatar-sm svg { width: 22px; height: 22px; }
    .profile-meta h1 { font-size: 16px; font-weight: 650; letter-spacing: .2px; }
    .profile-meta .role { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .profile-meta .admin-link {
      display: inline-block; margin-top: 4px; font-size: 12px;
      color: var(--accent); text-decoration: none;
      border-bottom: 1px dashed var(--border);
      transition: border-color .18s var(--ease);
    }
    .profile-meta .admin-link:hover { border-bottom-color: var(--accent); }

    /* 右侧操作按钮（主题切换 + 清空）：简洁圆形/胶囊，玻璃拟态去掉 */
    .header-actions { position: absolute; top: 12px; right: 16px; display: flex; gap: 8px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 9px;
      display: grid; place-items: center; cursor: pointer;
      background: var(--surface-2); color: var(--ink);
      border: 1px solid var(--border);
      transition: background .18s var(--ease), transform .18s var(--ease);
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn:active { transform: scale(.94); }
    .icon-btn svg { width: 17px; height: 17px; }
    .clear-btn {
      height: 34px; padding: 0 12px; border-radius: 9px; cursor: pointer;
      background: var(--surface-2); color: var(--ink);
      border: 1px solid var(--border); font-size: 12.5px;
      transition: background .18s var(--ease);
    }
    .clear-btn:hover { background: var(--border); }

    /* ============ 中部：聊天消息滚动区 ============ */
    #chat {
      flex: 1; overflow-y: auto; padding: 22px 20px;
      display: flex; flex-direction: column; gap: 16px;
      max-width: 800px; width: 100%; margin: 0 auto;
      scroll-behavior: smooth; position: relative; z-index: 1;
    }
    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
    #chat::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ============ 对话卡片：AI 靠左无气泡（纯文本），用户靠右浅块 ============ */
    .bubble-card {
      display: flex; gap: 12px; align-items: flex-start;
      max-width: 92%;
      animation: msg-in .3s var(--ease) both;
    }
    .bubble-card.user { align-self: flex-end; flex-direction: row-reverse; }
    .bc-avatar {
      width: 30px; height: 30px; flex: 0 0 auto; border-radius: 8px;
      display: grid; place-items: center; color: #fff;
      font-size: 12px; font-weight: 700;
    }
    .bubble-card.bot  .bc-avatar { background: var(--accent); }
    .bubble-card.user .bc-avatar { background: var(--surface-2); color: var(--ink); border: 1px solid var(--border); }
    .bc-avatar svg { width: 17px; height: 17px; }
    .bc-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .bc-head { display: flex; align-items: baseline; gap: 8px; font-size: 11.5px; color: var(--text-dim); }
    .bc-name { font-weight: 600; color: var(--ink); }
    .bubble-card.user .bc-head { flex-direction: row-reverse; }
    .bc-msg {
      padding: 2px 0; line-height: 1.75; font-size: 15px;
      white-space: pre-wrap; word-break: break-word;
    }
    /* AI 消息：无背景气泡，纯文本（贴近 DeepSeek 的克制观感） */
    .bubble-card.bot .bc-msg { color: var(--ink); }
    .bubble-card.bot .bc-msg strong { color: var(--accent); }
    /* 用户消息：右对齐浅色块 */
    .bubble-card.user .bc-msg {
      background: var(--surface-2); color: var(--ink);
      padding: 11px 15px; border-radius: var(--radius); border: 1px solid var(--border);
    }

    /* “思考中”行：左侧三个跳动圆点 */
    .thinking-row { align-self: flex-start; display: inline-flex; padding-left: 42px; }
    .typing { display: inline-flex; align-items: center; gap: 5px; }
    .typing .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
      opacity: .4; animation: blink 1.2s infinite both;
    }
    .typing .dot:nth-child(2) { animation-delay: .2s; }
    .typing .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .3; transform: translateY(0); }
      40%           { opacity: 1;  transform: translateY(-3px); }
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    /* 来源引用区：AI 卡片下方，缩进对齐气泡正文 */
    .sources {
      align-self: flex-start; font-size: 12px; color: var(--text-dim);
      max-width: 92%; margin-left: 42px; padding-left: 2px;
      animation: msg-in .3s var(--ease) both;
    }
    .sources b { color: var(--ink); }
    .src-tag {
      display: inline-block; background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 3px 9px; margin: 3px 4px 0 0; color: var(--ink);
    }

    /* 深度研究思维链：展示 Orchestrator 拆解出的子问题 */
    .sub-queries {
      align-self: flex-start; font-size: 12px; color: var(--text-dim);
      max-width: 92%; margin-left: 42px; padding-left: 2px;
      animation: msg-in .3s var(--ease) both;
    }
    .sub-queries b { color: var(--ink); }
    .sub-tag {
      display: inline-block; background: var(--surface); border: 1px dashed var(--border);
      border-radius: 7px; padding: 3px 9px; margin: 3px 4px 0 0; color: var(--ink);
    }
    .deep-toggle {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--text-dim); cursor: pointer;
      user-select: none; white-space: nowrap; padding: 0 4px;
    }
    .deep-toggle input { accent-color: var(--accent); cursor: pointer; }

    /* ============ 示例问题 chips ============ */
    #chips {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      padding: 0 20px 10px; max-width: 800px; margin: 0 auto; width: 100%;
    }
    .chip {
      font-size: 12.5px; padding: 7px 13px; border: 1px solid var(--border);
      border-radius: 999px; background: var(--surface); color: var(--text-dim);
      cursor: pointer; transition: all .18s var(--ease);
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip:active { transform: scale(.97); }

    /* ============ 底部：输入区（圆角容器 + 发送按钮） ============ */
    #inputBar {
      display: flex; gap: 10px; align-items: center;
      padding: 10px; margin: 0 auto 16px; max-width: 800px; width: calc(100% - 32px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
    }
    #q {
      flex: 1; padding: 11px 14px; border: none; border-radius: var(--radius-sm);
      background: transparent; color: var(--ink); font-size: 15px; outline: none;
    }
    #q::placeholder { color: var(--text-dim); }
    #send {
      padding: 0 20px; height: 40px; border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: filter .18s var(--ease), transform .12s var(--ease);
    }
    #send:hover:not(:disabled) { filter: brightness(1.08); }
    #send:active:not(:disabled) { transform: scale(.96); }
    #send:disabled { opacity: .5; cursor: not-allowed; }

    /* ============ 设置区（可折叠） ============ */
    details {
      max-width: 800px; margin: 0 auto 12px; width: calc(100% - 32px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2px 16px;
    }
    summary {
      cursor: pointer; font-size: 13px; color: var(--text-dim);
      padding: 11px 0; user-select: none; display: flex; align-items: center; gap: 6px;
    }
    summary::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }
    .settings { display: flex; gap: 10px; flex-wrap: wrap; padding-bottom: 10px; }
    .settings input {
      flex: 1; min-width: 200px; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--ink);
    }
    .settings input:focus { border-color: var(--accent); outline: none; }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ============ 响应式：窄屏 ============ */
    @media (max-width: 640px) {
      header { padding: 12px 14px; }
      .profile { gap: 10px; }
      .avatar-sm { width: 34px; height: 34px; border-radius: 9px; }
      .profile-meta h1 { font-size: 15px; }
      .profile-meta .role { font-size: 12px; }
      .header-actions { top: 10px; right: 12px; }
      #chat { padding: 16px 14px; gap: 12px; }
      .bubble-card { max-width: 96%; }
      .sources, .sub-queries { max-width: 96%; margin-left: 42px; }
      #chips { padding: 0 12px 8px; }
      #inputBar { margin-bottom: 12px; width: calc(100% - 24px); }
    }

    /* ============ 无障碍：尊重“减少动态效果” ============ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
  </style>
</head>

<body>
  <!-- 顶部：极简标题栏（Logo + 名字/身份 + 后台入口 + 主题/清空） -->
  <header>
    <div class="profile">
      <div class="avatar-sm" aria-hidden="true">
        <!-- 聊天气泡 Logo：主色描边 -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/>
          <path d="M8.5 11.5h.01M12 11.5h.01M15.5 11.5h.01"/>
        </svg>
      </div>
      <div class="profile-meta">
        <h1>许成合 · 个人 AI 助手</h1>
        <p class="role">基于 RAG 检索增强 · 关于我的经历、技能、项目，尽管问</p>
        <a href="/admin" class="admin-link" aria-label="打开后台管理页">后台管理 · 检测与上传 →</a>
      </div>
    </div>
    <div class="header-actions">
      <!-- 主题切换：浅色→深色→跟随系统 循环 -->
      <button id="themeToggle" class="icon-btn" type="button" aria-label="切换主题">🌗</button>
      <!-- 清空对话 -->
      <button id="clear" class="clear-btn" type="button" aria-label="清空当前对话">清空</button>
    </div>
  </header>

  <!-- 聊天消息区 -->
  <main id="chat" role="log" aria-live="polite" aria-relevant="additions" aria-label="对话记录">
    <!-- 首条欢迎语（AI 卡片）。清空对话时会重新插入这条。 -->
    <div class="bubble-card bot">
      <div class="bc-avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/><path d="M8.5 11.5h.01M12 11.5h.01M15.5 11.5h.01"/></svg>
      </div>
      <div class="bc-body">
        <div class="bc-head"><span class="bc-name">AI 助手</span><span class="bc-time">——</span></div>
        <div class="bc-msg">你好，我是许成合的个人 AI 助手。你可以问我：他会哪些技术？做过什么项目？期望的岗位是什么？</div>
      </div>
    </div>
  </main>

  <!-- 示例问题 -->
  <nav id="chips" aria-label="示例问题">
    <button class="chip" type="button">你会哪些技术？</button>
    <button class="chip" type="button">做过什么项目？</button>
    <button class="chip" type="button">期望岗位是什么？</button>
  </nav>

  <!-- 底部输入区 -->
  <form id="inputBar" aria-label="输入问题">
    <input id="q" type="text" placeholder="输入你的问题，按回车发送…" aria-label="你的问题" autocomplete="off" />
    <label class="deep-toggle" title="开启后由多智能体把问题拆解、并行检索各资料块再汇总，适合“介绍整个项目”这类综合问题">
      <input type="checkbox" id="deepToggle" /> 深度研究
    </label>
    <button id="send" type="submit" aria-label="发送问题">发送</button>
  </form>

  <!-- 可折叠设置区 -->
  <details>
    <summary>连接设置（后端地址 / API Key）</summary>
    <div class="settings">
      <input id="apiBase" placeholder="后端地址，如 http://127.0.0.1:8000" aria-label="后端地址" />
      <input id="apiKey" placeholder="API Key（默认 change_me）" aria-label="API Key" />
    </div>
  </details>

  <script>
    // ============ 0. 主题：light / dark / system 三态切换，持久化到 localStorage ============
    const themeToggle = document.getElementById("themeToggle");
    const THEME_KEY = "theme";
    const THEME_ICONS = {
      light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
      dark:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
      system:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>'
    };
    const THEME_LABEL = { light: "浅色", dark: "深色", system: "跟随系统" };
    function applyTheme() {
      const t = localStorage.getItem(THEME_KEY) || "system";
      document.documentElement.setAttribute("data-theme", t);
      themeToggle.innerHTML = THEME_ICONS[t];
      themeToggle.setAttribute("aria-label", "当前主题：" + THEME_LABEL[t]);
    }
    function cycleTheme() {
      const order = ["light", "dark", "system"];
      const cur = localStorage.getItem(THEME_KEY) || "system";
      const next = order[(order.indexOf(cur) + 1) % 3];
      localStorage.setItem(THEME_KEY, next);
      applyTheme();
    }
    themeToggle.addEventListener("click", cycleTheme);
    applyTheme();
    matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if ((localStorage.getItem(THEME_KEY) || "system") === "system") applyTheme();
    });

    // ============ 1. 获取页面元素 ============
    const chat = document.getElementById("chat");
    const form = document.getElementById("inputBar");
    const input = document.getElementById("q");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");
    const apiBaseInput = document.getElementById("apiBase");
    const apiKeyInput = document.getElementById("apiKey");
    const deepToggle = document.getElementById("deepToggle");

    // ============ 2. 读取/初始化配置 ============
    apiBaseInput.value = localStorage.getItem("apiBase") || "";
    apiKeyInput.value = localStorage.getItem("apiKey") || "change_me";
    apiBaseInput.addEventListener("input", () => localStorage.setItem("apiBase", apiBaseInput.value.trim()));
    apiKeyInput.addEventListener("input", () => localStorage.setItem("apiKey", apiKeyInput.value.trim()));

    // ============ 2.5 头像 / 名字常量 ============
    const BOT_AVATAR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/><path d="M8.5 11.5h.01M12 11.5h.01M15.5 11.5h.01"/></svg>';
    const BOT_NAME = "AI 助手";
    const USER_NAME = "我";
    function nowTime() { return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }); }

    // ============ 3. 欢迎语原文 ============
    const WELCOME = "你好，我是许成合的个人 AI 助手。你可以问我：他会哪些技术？做过什么项目？期望的岗位是什么？";

    // ============ 4. 工具函数：插入一条消息卡片 ============
    function addMessage(role, text) {
      const card = document.createElement("div");
      card.className = "bubble-card " + role;
      const avatar = role === "bot" ? BOT_AVATAR : USER_NAME;
      const name = role === "bot" ? BOT_NAME : USER_NAME;
      card.innerHTML =
        '<div class="bc-avatar" aria-hidden="true">' + avatar + '</div>' +
        '<div class="bc-body">' +
          '<div class="bc-head"><span class="bc-name">' + name + '</span>' +
            '<span class="bc-time">' + nowTime() + '</span></div>' +
          '<div class="bc-msg">' + (role === "bot" ? renderMarkdown(text) : escapeHtml(text)) + '</div>' +
        '</div>';
      chat.appendChild(card);
      chat.scrollTop = chat.scrollHeight;
      return card;
    }

    // ============ 5. 工具函数：渲染来源标签 ============
    function addSources(sources) {
      if (!sources || sources.length === 0) return;
      const unique = [...new Set(sources)];
      const div = document.createElement("div");
      div.className = "sources";
      div.innerHTML = "<b>来源：</b>" + unique
        .map(s => `<span class="src-tag">${escapeHtml(basename(s))}</span>`).join("");
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // ============ 5.5 工具函数：深度研究思维链 ============
    function addSubQueries(subs) {
      if (!subs || !subs.length) return;
      const div = document.createElement("div");
      div.className = "sub-queries";
      div.innerHTML = "<b>深度研究拆分的子问题：</b>" + subs
        .map(s => `<span class="sub-tag">${escapeHtml(s)}</span>`).join("");
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // ============ 6. 工具函数：取文件名 ============
    function basename(path) { return String(path).split(/[\\/]/).pop(); }

    // ============ 7. 工具函数：转义 HTML ============
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // ============ 8. 工具函数：简易 markdown -> HTML ============
    function renderMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/^- (.+)$/gm, "• $1");
      return html;
    }

    // ============ 9. 核心：发送问题 -> 后端 SSE 流 -> 逐字渲染 ============
    async function ask(query) {
      query = (query || input.value).trim();
      if (!query) return;

      addMessage("user", query);     // 显示用户问题
      input.value = "";
      sendBtn.disabled = true;

      // 先显示一个“思考中”行（流式数据到达前给用户反馈）
      const typingRow = document.createElement("div");
      typingRow.className = "thinking-row";
      typingRow.innerHTML = '<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
      chat.appendChild(typingRow);
      chat.scrollTop = chat.scrollHeight;

      // 流式过程中要填充的 AI 卡片（收到首个 delta 时才创建）
      let botCard = null, botMsgEl = null, acc = "";

      // 处理后端推来的每个 SSE 事件
      function handleEvent(evt) {
        if (evt.type === "sub_queries") {
          if (typingRow.parentNode) typingRow.remove();   // 思维链优先于空思考行
          addSubQueries(evt.data);
        } else if (evt.type === "delta") {
          if (typingRow.parentNode) typingRow.remove();
          if (!botCard) {                                  // 首个 delta：创建 AI 卡片
            botCard = addMessage("bot", "");
            botMsgEl = botCard.querySelector(".bc-msg");
          }
          acc += evt.data;
          botMsgEl.innerHTML = renderMarkdown(acc);        // 逐字累积渲染
          chat.scrollTop = chat.scrollHeight;
        } else if (evt.type === "sources") {
          addSources(evt.data);
        } else if (evt.type === "error") {
          if (typingRow.parentNode) typingRow.remove();
          if (!botCard) { botCard = addMessage("bot", ""); botMsgEl = botCard.querySelector(".bc-msg"); }
          botMsgEl.innerHTML = "请求失败：" + escapeHtml(evt.data)
            + "<br>请检查：后端是否已启动？设置里的地址与 API Key 是否正确？";
        }
      }

      try {
        const base = (apiBaseInput.value.trim() || window.location.origin).replace(/\/$/, "");
        const res = await fetch(base + "/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": apiKeyInput.value.trim(),
          },
          body: JSON.stringify({ query, deep: deepToggle.checked }),
        });
        if (!res.ok) {
          // 连接阶段就失败（如 429 限流、401 鉴权）：直接解析错误
          let detail = "HTTP " + res.status;
          try { const e = await res.json(); if (e && e.detail) detail = "HTTP " + res.status + "：" + e.detail; } catch (_) {}
          if (typingRow.parentNode) typingRow.remove();
          if (!botCard) { botCard = addMessage("bot", ""); botMsgEl = botCard.querySelector(".bc-msg"); }
          botMsgEl.innerHTML = "请求失败：" + escapeHtml(detail);
          return;
        }

        // 读取流式响应：按 SSE 的 `data: {json}\n\n` 分帧解析
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let idx;
          // 每遇到空行分隔符就取出一帧（可能含多个 data: 行）
          while ((idx = buf.indexOf("\n\n")) !== -1) {
            const frame = buf.slice(0, idx);
            buf = buf.slice(idx + 2);
            for (const line of frame.split("\n")) {
              const t = line.trim();
              if (!t.startsWith("data:")) continue;
              const payload = t.slice(5).trim();
              if (!payload) continue;
              try { handleEvent(JSON.parse(payload)); } catch (_) { /* 忽略无法解析的行 */ }
            }
          }
        }
      } catch (err) {
        if (typingRow.parentNode) typingRow.remove();
        if (!botCard) { botCard = addMessage("bot", ""); botMsgEl = botCard.querySelector(".bc-msg"); }
        botMsgEl.innerHTML = "请求失败：" + escapeHtml(err.message)
          + "<br>请检查：后端是否已启动？设置里的地址与 API Key 是否正确？";
      } finally {
        sendBtn.disabled = false;
        chat.scrollTop = chat.scrollHeight;
        input.focus();
      }
    }

    // ============ 10. 绑定事件 ============
    form.addEventListener("submit", (e) => { e.preventDefault(); ask(); });
    clearBtn.addEventListener("click", () => { chat.innerHTML = ""; addMessage("bot", WELCOME); });
    document.querySelectorAll(".chip").forEach(chip =>
      chip.addEventListener("click", () => ask(chip.textContent)));
    input.focus();
  </script>
</body>
</html>
